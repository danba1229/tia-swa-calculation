<!-- 티스토리 HTML 모드에 넣는 안전한 반응형 예시 -->
<div
  id="tia-embed-wrap"
  style="
    width:100%;
    max-width:100%;
    margin:24px 0;
    padding:0;
    box-sizing:border-box;
  "
>
  <iframe
    id="tia-embed-frame"
    src="https://tia-support.vercel.app/embed"
    title="TIA Research Builder"
    loading="lazy"
    style="
      width:100%;
      min-height:1400px;
      height:1400px;
      border:0;
      border-radius:20px;
      background:#f8f4ec;
      overflow:hidden;
      display:block;
    "
    referrerpolicy="strict-origin-when-cross-origin"
    allowfullscreen>
  </iframe>
</div>

<script>
  (function () {
    var iframe = document.getElementById("tia-embed-frame");
    if (!iframe) return;

    function applyHeight(height) {
      var nextHeight = Math.max(1100, Number(height || 0));
      iframe.style.height = nextHeight + "px";
    }

    window.addEventListener("message", function (event) {
      if (event.origin !== "https://tia-support.vercel.app") return;
      if (!event.data || event.data.type !== "tia-embed-height") return;
      applyHeight(event.data.height);
    });
  })();
</script>
